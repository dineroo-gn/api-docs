updateDeliveryStatus:
  put:
    tags:
      - Delivery Management
    operationId: updateDeliveryStatus
    parameters:
      - name: deliveryId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            $ref: "../components/schemas/UpdateDeliveryStatusRequest.yaml"
      required: true
    responses:
      "200":
        description: OK
        content:
          '*/*':
            schema:
              $ref: "../components/schemas/DeliveryStatusResponse.yaml"
      "400":
        description: Bad Request
        content:
          application/problem+json:
            schema:
              $ref: "../components/responses/ErrorResponse.yaml"
            example:
              type: "about:blank"
              title: "Bad Request"
              status: 400
              detail: "The driverId is invalid."
              instance: "/v1/deliveries/{deliveryId}"

      "404":
        description: Order not found
        content:
          application/problem+json:
            schema:
              $ref: "../components/responses/ErrorResponse.yaml"
            example:
              type: "about:blank"
              title: "Not Found"
              status: 404
              detail: "deliveryId with ID '99999' was not found."
              instance: "/v1/deliveries/99999"
      "500":
        description: Internal Server Error
        content:
          application/problem+json:
            schema:
              $ref: "../components/responses/ErrorResponse.yaml"
            example:
              type: "about:blank"
              title: "Internal Server Error"
              status: 500
              detail: "Unexpected error occurred when retrieving the delivery."
              instance: "/v1/deliveries"


